<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Southern Heartbeat AED Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="controls">
    <strong>Routing Mode:</strong><br>
    <button id="walkBtn" type="button">🚶 Walk</button>
    <button id="driveBtn" type="button">🚗 Drive</button>
  </div>

  <div id="sidebar">
    <strong>Nearest AEDs</strong><br>
    <small>(Distances shown are straight-line)</small>
    <div id="nearestList">Loading AED data...</div>
  </div>

  <button id="toggleSidebarBtn" type="button" aria-label="Toggle sidebar">➖</button>
  <button id="homeBtn" type="button" aria-label="Go to my location">🏠</button>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
